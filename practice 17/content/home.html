<div class="home-content">
  <form id="task-form" class="input-wrap">
    <input id="task-input" type="text" placeholder="Новая задача..." autocomplete="off" />
    <button id="add-btn" type="submit">+</button>
  </form>

  <form id="reminder-form" class="reminder-form">
    <input id="reminder-text" type="text" placeholder="Текст напоминания..." autocomplete="off" required />
    <input id="reminder-time" type="datetime-local" required />
    <button type="submit">+ С напоминанием</button>
  </form>

  <div id="tasks-meta" class="tasks-meta">
    <span id="task-count"></span>
  </div>
  <div id="empty-state" class="empty">Список пуст.</div>
  <ul id="tasks-list"></ul>

  <div id="controls" class="controls hidden">
    <button id="clear-done">Удалить выполненные</button>
    <button id="clear-all" class="danger">Очистить всё</button>
  </div>
</div>
