<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow</title>

  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#000000" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="TaskFlow" />
  <link rel="apple-touch-icon" href="/icons/icon-128x128.png" />
  <link rel="icon" href="/icons/favicon.ico" type="image/x-icon" />

  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <div class="logo"><span class="logo-icon">◈</span>TaskFlow</div>
    <div id="status-badge" class="status-badge online"><span class="status-label">онлайн</span></div>
  </header>

  <section class="hero">
    <h1>Задачи.</h1>
  </section>

  <nav class="shell-nav">
    <button id="home-btn" class="nav-btn active">Задачи</button>
    <button id="about-btn" class="nav-btn">О приложении</button>
  </nav>

  <main id="app-content">
    <div class="loading-placeholder">Загрузка...</div>
  </main>

  <footer class="push-footer">
    <button id="enable-push" class="push-btn">Включить уведомления</button>
    <button id="disable-push" class="push-btn danger" style="display:none;">Отключить уведомления</button>
  </footer>

  <div id="toast" class="toast"></div>

  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
