<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход / Регистрация</title>
    <style>
        body {
            margin: 0;
            background: #f4f4f4;
            font-family: sans-serif;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        .row {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }
        .col {
            flex: 1;
            background: white;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        h2 {
            margin-top: 0;
            font-size: 1.5rem;
            font-weight: normal;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 0.9rem;
        }
        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
        .info-panel {
            background: white;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .token-info {
            background: #e9ecef;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 15px;
            word-break: break-all;
        }
        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .button-group button {
            width: auto;
            flex: 1;
        }
        .output {
            background: #f8f9fa;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: monospace;
            white-space: pre-wrap;
            max-height: 200px;
            overflow: auto;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col">
                <h2>Вход</h2>
                <form id="loginForm">
                    <div>
                        <label for="loginEmail">Email</label>
                        <input type="email" id="loginEmail" required>
                    </div>
                    <div>
                        <label for="loginPassword">Пароль</label>
                        <input type="password" id="loginPassword" required>
                    </div>
                    <button type="submit">Войти</button>
                </form>
            </div>
            <div class="col">
                <h2>Регистрация</h2>
                <form id="registerForm">
                    <div>
                        <label for="regFirstName">Имя</label>
                        <input type="text" id="regFirstName" required>
                    </div>
                    <div>
                        <label for="regLastName">Фамилия</label>
                        <input type="text" id="regLastName" required>
                    </div>
                    <div>
                        <label for="regEmail">Email</label>
                        <input type="email" id="regEmail" required>
                    </div>
                    <div>
                        <label for="regPassword">Пароль</label>
                        <input type="password" id="regPassword" required>
                    </div>
                    <button type="submit">Зарегистрироваться</button>
                </form>
            </div>
        </div>

        <div class="info-panel">
            <div id="tokenInfo" class="token-info hidden">
                <strong>Токен:</strong> <span id="tokenPreview"></span>
            </div>
            <div id="protectedActions" class="button-group hidden">
                <button id="getProfileBtn">Мой профиль</button>
                <button id="logoutBtn">Выйти</button>
            </div>
            <div id="output" class="output"></div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3000/api';

        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const loginEmail = document.getElementById('loginEmail');
        const loginPassword = document.getElementById('loginPassword');
        const regFirstName = document.getElementById('regFirstName');
        const regLastName = document.getElementById('regLastName');
        const regEmail = document.getElementById('regEmail');
        const regPassword = document.getElementById('regPassword');
        const tokenInfo = document.getElementById('tokenInfo');
        const tokenPreview = document.getElementById('tokenPreview');
        const protectedActions = document.getElementById('protectedActions');
        const getProfileBtn = document.getElementById('getProfileBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const outputDiv = document.getElementById('output');

        let accessToken = localStorage.getItem('accessToken');

        function updateUI() {
            if (accessToken) {
                const shortToken = accessToken.length > 30 
                    ? accessToken.substring(0, 20) + '…' + accessToken.slice(-10)
                    : accessToken;
                tokenPreview.textContent = shortToken;
                tokenInfo.classList.remove('hidden');
                protectedActions.classList.remove('hidden');
            } else {
                tokenInfo.classList.add('hidden');
                protectedActions.classList.add('hidden');
                outputDiv.textContent = '';
            }
        }
        updateUI();

        function showOutput(data, isError = false) {
            outputDiv.textContent = typeof data === 'string' ? data : JSON.stringify(data, null, 2);
            outputDiv.style.background = isError ? '#f8d7da' : '#f8f9fa';
            outputDiv.style.color = isError ? '#721c24' : 'inherit';
        }

        async function performLogin(email, password) {
            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await response.json();

                if (!response.ok) throw new Error(data.error || `Ошибка ${response.status}`);

                accessToken = data.accessToken;
                localStorage.setItem('accessToken', accessToken);
                updateUI();
                showOutput({ success: true, token: accessToken });
                return true;
            } catch (err) {
                showOutput(`Ошибка входа: ${err.message}`, true);
                return false;
            }
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = loginEmail.value.trim();
            const password = loginPassword.value.trim();
            if (!email || !password) {
                showOutput(' Заполните все поля', true);
                return;
            }
            await performLogin(email, password);
        });

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const firstName = regFirstName.value.trim();
            const lastName = regLastName.value.trim();
            const email = regEmail.value.trim();
            const password = regPassword.value.trim();

            if (!firstName || !lastName || !email || !password) {
                showOutput('Заполните все поля', true);
                return;
            }

            try {
                const regResponse = await fetch(`${API_BASE}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        first_name: firstName,
                        last_name: lastName,
                        email,
                        password
                    })
                });
                const regData = await regResponse.json();
                if (!regResponse.ok) {
                    throw new Error(regData.error || `Ошибка ${regResponse.status}`);
                }

                // Показываем сообщение об успешной регистрации
                showOutput({ 
                    success: true, 
                    user: regData 
                });

                // Очищаем поля регистрации (опционально)
                regFirstName.value = '';
                regLastName.value = '';
                regEmail.value = '';
                regPassword.value = '';

            } catch (err) {
                showOutput(`Ошибка регистрации: ${err.message}`, true);
            }
        });

        getProfileBtn.addEventListener('click', async () => {
            if (!accessToken) {
                showOutput('Нет токена. Выполните вход.', true);
                return;
            }
            try {
                const response = await fetch(`${API_BASE}/auth/me`, {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                const data = await response.json();
                if (!response.ok) throw new Error(data.error || `Ошибка ${response.status}`);
                showOutput(data);
            } catch (err) {
                showOutput(`${err.message}`, true);
                if (err.message.includes('401')) {
                    localStorage.removeItem('accessToken');
                    accessToken = null;
                    updateUI();
                }
            }
        });

        logoutBtn.addEventListener('click', () => {
            localStorage.removeItem('accessToken');
            accessToken = null;
            updateUI();
            showOutput('Вы вышли из системы');
        });
    </script>
</body>
</html>
