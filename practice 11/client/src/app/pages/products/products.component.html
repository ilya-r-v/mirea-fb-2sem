<div class="products-container">
    <h2>Products</h2>
    <a
        *ngIf="canManage"
        routerLink="/products/new"
        class="btn btn-success add-link">
        Add Product
    </a>
    <table class="table">
        <thead>
        <tr>
            <th>Image</th>
            <th>Title</th>
            <th>Category</th>
            <th>Price</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr *ngFor="let product of products">
            <td>
                <img
                    *ngIf="product.image; else noImg"
                    [src]="'http://localhost:3000' + product.image"
                    [alt]="product.title"
                    class="table-thumb" />
                <ng-template #noImg><span class="no-image">—</span></ng-template>
            </td>
            <td>{{ product.title }}</td>
            <td>{{ product.category }}</td>
            <td>{{ product.price | currency }}</td>
            <td>
                <a [routerLink]="['/products', product.id]" class="btn btn-primary mr-2">View</a>
                <ng-container *ngIf="canManage">
                    <a [routerLink]="['/products', product.id, 'edit']" class="btn btn-primary mr-2">Edit</a>
                </ng-container>
                <ng-container *ngIf="canDelete">
                    <button (click)="deleteProduct(product.id)" class="btn btn-danger mr-2">Delete</button>
                </ng-container>
            </td>
        </tr>
        </tbody>
    </table>
</div>
