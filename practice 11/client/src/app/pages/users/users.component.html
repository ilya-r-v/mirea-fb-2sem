<div class="users-container">
    <h2>Users</h2>
    <table class="table">
        <thead>
        <tr>
            <th>ID</th>
            <th>Email</th>
            <th>First Name</th>
            <th>Last Name</th>
            <th>Role</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr *ngFor="let user of users">
            <td>{{ user.id }}</td>
            <td>{{ user.email }}</td>
            <td>
                <span *ngIf="editingId !== user.id">{{ user.first_name }}</span>
                <input *ngIf="editingId === user.id" type="text" [(ngModel)]="editData.first_name">
            </td>
            <td>
                <span *ngIf="editingId !== user.id">{{ user.last_name }}</span>
                <input *ngIf="editingId === user.id" type="text" [(ngModel)]="editData.last_name">
            </td>
            <td>
                <span *ngIf="editingId !== user.id">{{ user.role }}</span>
                <select *ngIf="editingId === user.id" [(ngModel)]="editData.role">
                    <option value="user">user</option>
                    <option value="seller">seller</option>
                    <option value="admin">admin</option>
                </select>
            </td>
            <td>
                <span [class.blocked]="user.blocked">{{ user.blocked ? 'Blocked' : 'Active' }}</span>
            </td>
            <td>
                <ng-container *ngIf="editingId !== user.id">
                    <button (click)="startEdit(user)" class="btn btn-primary mr-2">Edit</button>
                    <button
                        *ngIf="!user.blocked"
                        (click)="blockUser(user.id)"
                        class="btn btn-danger mr-2">
                        Block
                    </button>
                </ng-container>
                <ng-container *ngIf="editingId === user.id">
                    <button (click)="saveEdit(user.id)" class="btn btn-success mr-2">Save</button>
                    <button (click)="cancelEdit()" class="btn btn-secondary">Cancel</button>
                </ng-container>
            </td>
        </tr>
        </tbody>
    </table>
</div>
