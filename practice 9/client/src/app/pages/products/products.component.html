<div class="products-container">
    <h2>Products</h2>
    <a routerLink="/products/new" class="btn btn-success add-link">Add Product</a>
    <table class="table">
        <thead>
        <tr>
            <th>Title</th>
            <th>Category</th>
            <th>Price</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr *ngFor="let product of products">
            <td>{{ product.title }}</td>
            <td>{{ product.category }}</td>
            <td>{{ product.price | currency }}</td>
            <td>
                <a [routerLink]="['/products', product.id]" class="btn btn-primary mr-2">View</a>
                <a [routerLink]="['/products', product.id, 'edit']" class="btn btn-primary mr-2">Edit</a>
                <button (click)="deleteProduct(product.id)" class="btn btn-primary">Delete</button>
            </td>
        </tr>
        </tbody>
    </table>
</div>
