<div class="form-container">
    <h2>{{ isEdit ? 'Edit' : 'Create' }} Product</h2>
    <form #productForm="ngForm" (ngSubmit)="onSubmit()">
        <div class="form-group">
            <label for="title">Title</label>
            <input type="text" id="title" name="title" [(ngModel)]="productData.title" required #title="ngModel">
            <div *ngIf="title.invalid && title.touched" class="error">Title required</div>
        </div>
        <div class="form-group">
            <label for="category">Category</label>
            <input type="text" id="category" name="category" [(ngModel)]="productData.category" required #category="ngModel">
            <div *ngIf="category.invalid && category.touched" class="error">Category required</div>
        </div>
        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" [(ngModel)]="productData.description" required #description="ngModel"></textarea>
            <div *ngIf="description.invalid && description.touched" class="error">Description required</div>
        </div>
        <div class="form-group">
            <label for="price">Price</label>
            <input type="number" step="0.01" id="price" name="price" [(ngModel)]="productData.price" required min="0" #price="ngModel">
            <div *ngIf="price.invalid && price.touched" class="error">Price must be at least 0</div>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary" [disabled]="productForm.invalid">{{ isEdit ? 'Update' : 'Create' }}</button>
            <a routerLink="/products" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
